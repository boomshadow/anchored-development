stages:
  - validate
  - build
  - drift-detection

validate:spec-index:
  stage: validate
  image: python:3.13-alpine@sha256:bb1f2fdb1065c85468775c9d680dcd344f6442a2d1181ef7916b60a623f11d40
  before_script:
    - apk add --no-cache git
    - pip install -q 'pyyaml==6.0.3'
  script:
    - python3 .claude/skills/spec/scripts/generate_index.py
    - git diff --exit-code docs/specs/INDEX.md

validate:adr-index:
  stage: validate
  image: python:3.13-alpine@sha256:bb1f2fdb1065c85468775c9d680dcd344f6442a2d1181ef7916b60a623f11d40
  before_script:
    - apk add --no-cache git
    - pip install -q 'pyyaml==6.0.3'
  script:
    - python3 .claude/skills/adr/scripts/generate_index.py
    - git diff --exit-code docs/decisions/INDEX.md

build:smoke-test:
  stage: build
  image: node:24.14.0-alpine3.22@sha256:76db75ca7e7da9148ae42c92d9be12d12a8d7b03e171f18339355d8078d644a0
  script:
    - npm ci
    - npm test

anchor-watch:
  stage: drift-detection
  image: registry.gitlab.com/boomshadow/anchor-watch-image@sha256:27fed2c241920c9c51e650fc0cba8d46cc0fda68a909ad0198d40b0944f7f15f
  script:
    - node .claude/agents/scripts/ci-drift-detector.mjs
  allow_failure: false
